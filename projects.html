<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects — Xandi Drysdale</title>
  <link rel="icon" type="image/png" href="assets/images/arhol.PNG">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #243d28;
      --green2: #2e5235;
      --cream:  #f2ede0;
      --cream2: #e8e0cc;
      --terra:  #c04e18;
      --terra2: #e07040;
      --ink:    #1c2e1f;
    }

    html {
      background: var(--cream);
      background-image: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(36,61,40,.04) 28px);
    }

    body {
      font-family: 'DM Mono', monospace;
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── BACK BUTTON ── */
    .back {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .58rem; letter-spacing: .15em; text-transform: uppercase;
      color: rgba(28,46,31,.38); text-decoration: none;
      padding: 2rem 2.5rem 0;
      transition: color .2s;
    }
    .back:hover { color: var(--terra); }
    .back { animation: fadeIn 0.4s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── GRID ── */
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.2rem 2.5rem 4rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
    }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

    /* ── PROJECT CARD ── */
    .proj-card {
      background: var(--green);
      border-radius: 6px;
      box-shadow: 3px 4px 0 rgba(0,0,0,.18);
      padding: 1.5rem 1.6rem 1.3rem;
      display: flex; flex-direction: column;
      cursor: pointer;
      user-select: none;
      position: relative; overflow: hidden;
      transition: transform .2s cubic-bezier(.22,.68,0,1.2),
                  box-shadow .2s ease;
      opacity: 0;
      visibility: hidden;
    }
    .proj-card:nth-child(1)  { --r: -.3deg; }
    .proj-card:nth-child(2)  { --r:  .4deg; }
    .proj-card:nth-child(3)  { --r: -.2deg; }
    .proj-card:nth-child(4)  { --r:  .3deg; }
    .proj-card:nth-child(5)  { --r: -.4deg; }

    .proj-card:hover {
      transform: rotate(0deg) translateY(-4px) scale(1.01) !important;
      box-shadow: 5px 8px 0 rgba(0,0,0,.22);
      z-index: 2;
    }

    .pc-num {
      font-size: .58rem; letter-spacing: .15em;
      color: var(--terra2); font-weight: 300; margin-bottom: .3rem;
    }
    .pc-title {
      font-family: 'Playfair Display', serif; font-weight: 900;
      font-size: 1.7rem; color: var(--cream);
      line-height: .95; letter-spacing: -.02em;
      margin-bottom: .6rem;
    }
    .pc-title em { font-style: italic; color: var(--terra2); }

    .pc-desc {
      font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: .9rem; color: rgba(242,237,224,.45);
      line-height: 1.5; margin-bottom: .9rem; font-weight: 300;
    }

    .pc-arrow {
      position: absolute; bottom: 1.1rem; right: 1.2rem;
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid rgba(242,237,224,.18);
      display: flex; align-items: center; justify-content: center;
      color: rgba(242,237,224,.35); font-size: .75rem;
      transition: opacity .2s, border-color .2s;
    }
    .proj-card:hover .pc-arrow {
      border-color: var(--terra2);
      color: var(--terra2);
    }

    /* Fine-line SVG deco per card */
    .pc-deco {
      position: absolute; top: 1rem; right: 1rem;
      opacity: .08; pointer-events: none;
    }

    /* ══════════════════════════════════════════
       DETAIL MODAL
    ══════════════════════════════════════════ */
    #modal {
      position: fixed; inset: 0; z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease;
    }
    #modal.open {
      opacity: 1; pointer-events: all;
    }

    /* Backdrop */
    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(10,14,10,.65);
      backdrop-filter: blur(4px);
      cursor: pointer;
    }

    /* Panel */
    .modal-panel {
      position: relative; z-index: 10;
      background: var(--cream);
      background-image: repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(36,61,40,.04) 28px);
      border-radius: 6px;
      width: 100%; max-width: 680px;
      max-height: calc(100vh - 3rem);
      overflow-y: auto;
      box-shadow: 6px 10px 0 rgba(0,0,0,.25), 0 20px 60px rgba(0,0,0,.35);
      transform: translateY(16px);
      transition: transform .35s cubic-bezier(.22,.68,0,1.2);
    }
    #modal.open .modal-panel {
      transform: translateY(0);
    }

    /* Modal header — green like a card */
    .modal-head {
      background: var(--green);
      padding: 2rem 2.2rem 1.8rem;
      position: relative;
      overflow: hidden;
    }

    .modal-close {
      position: absolute; top: 1.1rem; right: 1.1rem;
      background: none; border: 1.5px solid rgba(242,237,224,.18);
      border-radius: 3px; color: rgba(242,237,224,.4);
      font-family: 'DM Mono', monospace;
      font-size: .54rem; letter-spacing: .14em; text-transform: uppercase;
      padding: .3rem .65rem; cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .modal-close:hover { border-color: var(--terra2); color: var(--terra2); }

    .modal-num {
      font-size: .58rem; letter-spacing: .18em;
      color: var(--terra2); font-weight: 300; margin-bottom: .4rem;
    }
    .modal-title {
      font-family: 'Playfair Display', serif; font-weight: 900;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--cream); line-height: .92; letter-spacing: -.02em;
    }
    .modal-title em { font-style: italic; color: var(--terra2); }
    .modal-label {
      font-family: 'Crimson Pro', serif; font-style: italic;
      font-size: .88rem; color: rgba(242,237,224,.38);
      margin-top: .5rem;
    }

    /* Modal deco SVG */
    .modal-deco {
      position: absolute; top: 1.2rem; right: 4rem;
      opacity: .07; pointer-events: none;
    }

    /* Modal body */
    .modal-body {
      padding: 1.8rem 2.2rem 2rem;
    }

    .modal-section-label {
      font-size: .54rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--terra); margin-bottom: .5rem; font-weight: 400;
      display: flex; align-items: center; gap: .5rem;
    }
    .modal-section-label::before {
      content: ''; width: 14px; height: 1px; background: var(--terra);
    }

    .modal-desc {
      font-family: 'Crimson Pro', serif; font-size: 1.05rem;
      color: rgba(28,46,31,.75); line-height: 1.68;
      margin-bottom: 1.5rem; font-weight: 300;
    }

    /* Tags */
    .modal-tags {
      display: flex; flex-wrap: wrap; gap: .32rem; margin-bottom: 1.5rem;
    }
    .modal-tag {
      font-size: .5rem; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(28,46,31,.6); background: rgba(36,61,40,.07);
      border: 1px solid rgba(36,61,40,.14); border-radius: 2px;
      padding: .16rem .44rem;
    }

    /* Status */
    .modal-status {
      display: flex; align-items: center; gap: .5rem;
      margin-bottom: 1.5rem;
      padding: .55rem .9rem;
      background: rgba(36,61,40,.05);
      border: 1px solid rgba(36,61,40,.1);
      border-radius: 3px;
    }
    .modal-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--terra); opacity: .7; flex-shrink: 0;
    }
    .modal-status-txt {
      font-size: .54rem; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(28,46,31,.45);
    }

    /* Divider */
    .modal-rule {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(36,61,40,.12) 30%, rgba(36,61,40,.12) 70%, transparent);
      margin-bottom: 1.4rem;
    }

    /* Links row */
    .modal-links {
      display: flex; gap: .6rem; flex-wrap: wrap;
    }
    .modal-link {
      display: inline-flex; align-items: center; gap: .42rem;
      font-size: .58rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--ink); text-decoration: none;
      border: 1.5px solid rgba(36,61,40,.22); border-radius: 3px;
      padding: .44rem .9rem;
      transition: border-color .2s, color .2s, background .2s;
    }
    .modal-link:hover {
      border-color: var(--terra);
      color: var(--terra);
      background: rgba(196,80,24,.04);
    }
    .modal-link.primary {
      background: var(--green); color: var(--cream);
      border-color: var(--green);
    }
    .modal-link.primary:hover {
      background: var(--green2); border-color: var(--green2); color: var(--cream);
    }
  </style>
</head>
<body>

<!-- Back button -->
<a class="back" href="index.html">← Home</a>

<!-- Grid -->
<div class="grid" id="grid"></div>

<!-- Detail modal -->
<div id="modal">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-panel" id="modalPanel">
    <div class="modal-head" id="modalHead">
      <button class="modal-close" id="modalClose">✕ close</button>
      <svg class="modal-deco" width="100" height="90" viewBox="0 0 100 90" fill="none" id="modalDeco"></svg>
      <div class="modal-num" id="modalNum"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-label" id="modalLabel"></div>
    </div>
    <div class="modal-body">
      <div class="modal-section-label">Overview</div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-status" id="modalStatus">
        <div class="modal-status-dot"></div>
        <div class="modal-status-txt" id="modalStatusTxt"></div>
      </div>
      <div class="modal-rule"></div>
      <div class="modal-links" id="modalLinks"></div>
    </div>
  </div>
</div>

<script src="assets/js/gsap.min.js"></script>
<script>
const PROJECTS = [
  {
    n: '01', label: 'Platform',
    title: 'Parliament<br><em>Navigator</em>',
    titlePlain: 'Parliament Navigator',
    shortDesc: 'Corporate affairs intelligence for UK parliamentary activity.',
    longDesc: 'A full-stack corporate affairs platform that ingests live UK parliamentary debate transcripts and maps relationships between MPs, topics, bills, and contributions. Includes an alert system for pharmaceutical policy relevance, a Neo4j graph database for relationship queries, and a Streamlit dashboard for stakeholder intelligence. Deployed on a Hetzner VPS with a React frontend and FastAPI backend.',
    tags: ['Neo4j', 'FastAPI', 'React', 'Streamlit', 'Python', 'Docker', 'Hetzner'],
    status: 'Live — Hetzner VPS',
    github: 'https://github.com/Alex-Drysdale',
    live: null,
    decoType: 'hex',
  },
  {
    n: '02', label: 'ML Pipeline',
    title: 'Hansard<br><em>ML Pipeline</em>',
    titlePlain: 'Hansard ML Pipeline',
    shortDesc: 'Classifying pharmaceutical relevance in UK parliamentary debates.',
    longDesc: 'A machine learning pipeline that classifies UK Hansard debate transcripts for pharmaceutical relevance. Uses TF-IDF vectorisation with Logistic Regression as the base classifier, wrapped in an active learning loop. A Streamlit labelling app lets me annotate uncertain predictions, feeding back into the model. Outputs feed directly into Parliament Navigator\'s alert system.',
    tags: ['Python', 'Scikit-learn', 'Streamlit', 'Neo4j', 'TF-IDF', 'Active Learning', 'NLP'],
    status: 'Production — feeds Parliament Navigator',
    github: 'https://github.com/Alex-Drysdale',
    live: null,
    decoType: 'molecule',
  },
  {
    n: '03', label: 'From Scratch',
    title: 'MLP from<br><em>Scratch</em>',
    titlePlain: 'MLP from Scratch',
    shortDesc: 'Neural network built without any ML framework.',
    longDesc: 'A multi-layer perceptron implemented entirely from scratch in Python — no PyTorch, no TensorFlow, no Scikit-learn. Implements forward pass matrix multiplication, sigmoid and ReLU activations, backpropagation via the chain rule, and mini-batch gradient descent by hand. Built to deeply understand what ML libraries abstract away.',
    tags: ['Python', 'NumPy', 'Backpropagation', 'Neural Networks', 'Mathematics'],
    status: 'Educational — pure implementation',
    github: 'https://github.com/Alex-Drysdale',
    live: null,
    decoType: 'wave',
  },
  {
    n: '04', label: 'This Site',
    title: 'Portfolio<br><em>Website</em>',
    titlePlain: 'Portfolio Website',
    shortDesc: 'No framework, no build step — just HTML, CSS, and JS.',
    longDesc: 'This website. Built with plain HTML, CSS, and vanilla JavaScript — no framework, no bundler, no build step. Deployed via Cloudflare Pages on git push. The design follows a "lab notebook" aesthetic: a 12-column card grid, fine-line SVG molecular and circuit illustrations, physics-driven rope animations on the contact card, and a Playfair Display + DM Mono typographic pairing.',
    tags: ['HTML', 'CSS', 'JavaScript', 'Cloudflare Pages', 'SVG', 'CSS Physics'],
    status: 'Live at xandidrysdale.com',
    github: 'https://github.com/Alex-Drysdale',
    live: 'https://xandidrysdale.com',
    decoType: 'hex',
  },
];

// ── DECO SVGS ─────────────────────────────────────
const DECOS = {
  hex: `<polygon points="25,5 65,5 75,22 65,39 25,39 15,22" stroke="#f2ede0" stroke-width="1" fill="none"/>
        <polygon points="45,39 85,39 95,56 85,73 45,73 35,56" stroke="#f2ede0" stroke-width="1" fill="none"/>`,
  molecule: `<circle cx="50" cy="45" r="18" stroke="#f2ede0" stroke-width="1" fill="none"/>
             <circle cx="50" cy="45" r="8" stroke="#f2ede0" stroke-width=".8" fill="none"/>
             <line x1="50" y1="27" x2="50" y2="15" stroke="#f2ede0" stroke-width=".8"/>
             <line x1="68" y1="45" x2="80" y2="45" stroke="#f2ede0" stroke-width=".8"/>
             <line x1="50" y1="63" x2="50" y2="75" stroke="#f2ede0" stroke-width=".8"/>
             <line x1="32" y1="45" x2="20" y2="45" stroke="#f2ede0" stroke-width=".8"/>
             <circle cx="50" cy="13" r="3" stroke="#f2ede0" stroke-width=".8" fill="none"/>
             <circle cx="82" cy="45" r="3" stroke="#f2ede0" stroke-width=".8" fill="none"/>`,
  wave: `<path d="M5 45 Q20 25 35 45 Q50 65 65 45 Q80 25 95 45" stroke="#f2ede0" stroke-width="1" fill="none"/>
         <path d="M5 58 Q20 38 35 58 Q50 78 65 58 Q80 38 95 58" stroke="#f2ede0" stroke-width=".6" fill="none" opacity=".5"/>`,
  pulse: `<path d="M5 45 L25 45 L32 25 L40 65 L48 35 L56 55 L62 45 L95 45" stroke="#f2ede0" stroke-width="1" fill="none" stroke-linejoin="round" stroke-linecap="round"/>`,
};

// ── BUILD GRID ────────────────────────────────────
const grid = document.getElementById('grid');

PROJECTS.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'proj-card';
  card.innerHTML = `
    <svg class="pc-deco" width="90" height="80" viewBox="0 0 100 90" fill="none">
      ${DECOS[p.decoType]}
    </svg>
    <div class="pc-num">${p.n} ——</div>
    <div class="pc-title">${p.title}</div>
    <div class="pc-desc">${p.shortDesc}</div>
    <div class="pc-arrow">↗</div>
  `;
  card.addEventListener('click', () => openModal(i));
  grid.appendChild(card);
});

// ── MODAL ─────────────────────────────────────────
const modal    = document.getElementById('modal');
const mBackdrop = document.getElementById('modalBackdrop');
const mClose   = document.getElementById('modalClose');

function openModal(idx) {
  const p = PROJECTS[idx];

  document.getElementById('modalNum').textContent   = `${p.n} — ${p.label}`;
  document.getElementById('modalTitle').innerHTML   = p.title;
  document.getElementById('modalLabel').textContent = p.titlePlain;
  document.getElementById('modalDesc').textContent  = p.longDesc;
  document.getElementById('modalStatusTxt').textContent = p.status;
  document.getElementById('modalDeco').innerHTML    = DECOS[p.decoType];

  const tagsEl = document.getElementById('modalTags');
  tagsEl.innerHTML = p.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');

  const linksEl = document.getElementById('modalLinks');
  linksEl.innerHTML = '';

  const ghBtn = document.createElement('a');
  ghBtn.className = 'modal-link primary';
  ghBtn.href = p.github; ghBtn.target = '_blank';
  ghBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg> GitHub`;
  linksEl.appendChild(ghBtn);

  if (p.live) {
    const liveBtn = document.createElement('a');
    liveBtn.className = 'modal-link';
    liveBtn.href = p.live; liveBtn.target = '_blank';
    liveBtn.textContent = '↗ Live site';
    linksEl.appendChild(liveBtn);
  }

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

mClose.addEventListener('click', closeModal);
mBackdrop.addEventListener('click', closeModal);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── MAGNETIC SCATTER ANIMATION ───────────────────
(function() {
  const cards = document.querySelectorAll('.proj-card');
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Scatter cards within the visible viewport, offset from their grid positions
  // These are relative offsets — small enough to stay on-screen
  const scatterOffsets = [
    { x: -180, y:  120, r: -25, s: 0.75 },
    { x:  200, y:  100, r:  30, s: 0.7  },
    { x:  160, y: -80,  r:  20, s: 0.72 },
    { x: -140, y: -100, r: -18, s: 0.68 },
    { x:  100, y:  60,  r:  35, s: 0.7  },
  ];

  // Make cards visible but scatter them near center of viewport
  cards.forEach((card, i) => {
    const rect = card.getBoundingClientRect();
    const off = scatterOffsets[i % scatterOffsets.length];
    // Push cards toward viewport center + offset, so all are visible
    const centerPullX = (vw / 2 - rect.left - rect.width / 2) * 0.5;
    const centerPullY = (vh / 2 - rect.top - rect.height / 2) * 0.4;
    gsap.set(card, {
      visibility: 'visible',
      opacity: 0.7,
      x: centerPullX + off.x + (Math.random() - 0.5) * 60,
      y: centerPullY + off.y + (Math.random() - 0.5) * 60,
      rotation: off.r + (Math.random() - 0.5) * 15,
      scale: off.s,
    });
  });

  // Brief pause showing chaos, then snap into grid
  const tl = gsap.timeline({ delay: 0.15 });

  // Small initial drift — cards float slightly while scattered
  cards.forEach((card, i) => {
    tl.to(card, {
      duration: 0.3,
      x: '+=' + ((Math.random() - 0.5) * 30),
      y: '+=' + ((Math.random() - 0.5) * 20),
      rotation: '+=' + ((Math.random() - 0.5) * 8),
      ease: 'sine.inOut',
    }, 0);
  });

  // Magnetic snap — all cards pull into position
  cards.forEach((card, i) => {
    tl.to(card, {
      duration: 0.9,
      x: 0,
      y: 0,
      rotation: 0,
      scale: 1,
      opacity: 1,
      ease: 'elastic.out(0.8, 0.45)',
      delay: i * 0.08,
    }, 0.35);
  });

  // Subtle settle — tiny overshoot correction
  cards.forEach((card, i) => {
    tl.to(card, {
      duration: 0.3,
      boxShadow: '3px 4px 0 rgba(0,0,0,.18)',
      ease: 'power2.out',
    }, 1.2 + i * 0.05);
  });
})();
</script>
</body>
</html>
